# Свойства закачиваемой жидкости по типу воды (Методика, разд. 8; см. «Три вида воды для ППД»).
# Плотность ρ входит в напор (8), (10), статический напор (20), оптимальное давление (23);
# вязкость ν запускает пересчёт характеристик на вязкость (28)-(30) и потери (40).
#
# ВАЖНО: это типовые ориентиры. Плотность для конкретного объекта должна задаваться по ЗАМЕРУ
# (поле rho в config/plants/<объект>.yaml переопределяет значение отсюда). Значения-ориентиры
# помечены estimate: true.

fluids:
  пресная:
    rho: 1000.0        # кг/м³
    nu: 1.0            # сСт (вода ~20 °C)
    estimate: true
    note: "Пресная вода для закачки; фокус — КПД и дросселирование."

  агрессивная:
    rho: 1100.0        # кг/м³ (коррозионно-агрессивный агент; уточнять по объекту)
    nu: 1.1            # сСт
    estimate: true
    note: "Повышенный износ → приоритет диагностики ΔP_изн (42) и мероприятий по замене НА."

  пластовая:
    rho: 1130.0        # кг/м³ (повышенная минерализация; уточнять по замеру)
    nu: 1.2            # сСт
    estimate: true
    note: "Попутно добываемая пластовая вода; плотность выше пресной — критично для (8),(10),(23)."
