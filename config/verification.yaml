# Манифест верификации: объекты с эталонными «… расчет.xlsx» из отчётов энергоаудита.
# Пути — относительно data/raw/ntu (ссылка на «НТУ цифровая платформа»).

base_dir: "data/raw/ntu"

# Толерансы сверки (отн. отклонение модель↔эталон). Параметризуемо.
tolerances:
  sec_fact: 0.02        # УРЭ факт — прямое измерение
  eta_fact: 0.05        # КПД факт
  sec_calc: 0.05        # УРЭ расчётный (зависит от η_ном)
  eta_nom: 0.05         # КПД номинальный
  load_factor: 0.10     # K_з
  h_fact: 0.05          # напор фактический
  dw_efficiency: 0.10   # годовые потери по КПД
  dw_throttle: 0.10     # годовые потери на дросселирование

# Каждому объекту — эталонный «… расчет.xlsx» (file: входы+выходы).
objects:
  - id: kns25
    name: "КНС-25"
    file: "Пресная вода/КНС 25 выезд 11.03.2024/кнс 25 расчет.xlsx"
  - id: kns155bn
    name: "КНС-155 БН"
    file: "пластовая вода/15Кнс 155 БН 28.03.24/кнс-155 расчет.xlsx"
  - id: kns14an
    name: "КНС-14 АН"
    file: "Пресная вода/КНС 14 АН/КНС 14 АН расчет.xlsx"
  - id: knsopu
    name: "КНС-ОПУ"
    file: "агрессивная вода/КНС-ОПУ выезд 08.04.2026г/КНС -ОПУ расчет.xlsx"
  - id: kns10bn
    name: "КНС-10 БН"
    file: "пластовая вода/13 Кнс 10 БН 27.03.24/кнс-10 расчет.xlsx"
  - id: kns154bn
    name: "КНС-154 БН"
    file: "пластовая вода/Кнс 154 БН 28.03.24/кнс-154 расчет.xlsx"
  - id: kns155tbn
    name: "КНС-155т БН"
    file: "пластовая вода/16КНС 155т БН 28.03.24/кнс-155 расчет.xlsx"
