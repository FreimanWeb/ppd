# Технологические огра/целевые показатели системы ППД.
# Применяются в расчётах режима, диагностике рабочей точки и при оптимизации уставок
# (ТЗ, разд. 5 промта; «Пилотные объекты и каталог КНС»).

# Предельные давления по узлам, МПа (типовые; уточняются паспортом объекта).
pressure_limits:
  pump_discharge_max: 16.0   # макс. давление на выкиде насоса
  manifold_max: 12.0         # макс. давление на БГ/гребёнке
  waterline_max: 12.0        # макс. рабочее давление водовода

# Частотный преобразователь (ПЧ).
vfd:
  freq_min_hz: 35.0
  freq_max_hz: 50.0
  efficiency: 0.97           # η_пч (Методика, разд. 8)
  target_eff_zone: [0.55, 0.75]  # целевая зона КПД насосной установки

# Режим пусков/остановов и резервирование.
operation:
  max_starts_per_day: 6      # макс. пусков/остановов в сутки (анти-циклика)
  reserve_scheme: "N+1"      # горячий резерв
  forbid_simultaneous_work_reserve: true  # запрет одновременного вывода рабочего и резервного

# Нагнетательные скважины.
wells:
  injectivity_max_m3_day: 1000.0   # лимит приёмистости (типовой; по фонду)

# Целевые KPI системы ППД.
kpi:
  target_sec_2035: 3.88      # целевой УРЭ системы ППД, кВт·ч/м³ (ориентир к 2035, ТВ№4)
  sec_accuracy_min: 0.80     # требуемая точность УРЭ к коммерческому учёту (≥80%)
  potential_min: 0.10        # целевой потенциал снижения УРЭ (≥10%)

# Экономика.
economics:
  tariff_rub_kwh: 4.68       # тариф на электроэнергию, руб/кВт·ч (по отчёту ЭА №31)
