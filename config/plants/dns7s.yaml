# Паспорт объекта ДНС-7с (ЦДНГ-5, НГДУ «Джалильнефть») — пилот Этапа 1.
# Источники: отчёт энергоаудита №31 (18.12.2025), телеметрия «Копия ДНС-7с ДН.xlsx».
#
# Тип расчёта: НА-4 (ЦНС 60-250) перекачивает водонефтяную эмульсию к ДНС-3с,
# поэтому применяется ветка «перекачка нефти» Методики (формулы 19-23, 37-43).

meta:
  id: dns7s
  name: "ДНС-7с"
  cdng: "ЦДНГ-5"
  ngdu: "НГДУ «Джалильнефть»"
  branch: "перекачка"        # перекачка | кнс  → выбирает ветку декомпозиции

# Свойства перекачиваемой жидкости (по замеру аудита; не из типового справочника).
fluid:
  type: "пластовая"          # ссылка на config/fluids.yaml для умолчаний ν
  rho: 1094.2                # кг/м³ — ЗАМЕР (Табл. 3.1 отчёта); переопределяет fluids.yaml
  watercut: 0.85             # обводнённость до 85 %
  nu: 1.05                   # сСт (нефть 1,00-1,10 мПа·с при 20 °С), оценка
  estimate_fields: [nu]

# Насосные агрегаты. Рабочий — Н-4; Н-1..Н-3 — резерв (наработка < 100 ч/год).
aggregates:
  - id: "Н-4"
    role: "работа"
    pump:
      model: "ЦНС 60-250"
      q_nom: 60.0            # м³/ч
      h_nom: 250.0           # м
      eta_nom: 0.60          # η_нас.ном (Табл. 1.2: КПД 60 %)
      power_consumed_nom: 63.8   # кВт (паспортная потребляемая)
      overhaul: "2025-03"    # капремонт 03.2025
      # координаты паспортной кривой Q-H-η заполняются в Спринте 2 (curves.py)
      curve_qh: []           # [[Q, H], ...]
      curve_qeta: []         # [[Q, eta], ...]
    motor:
      model: "ВАО3-280М-2У2,5"
      kind: "асинхронный"    # → α в (26)
      p_nom: 160.0           # кВт
      voltage_kv: 6.0
      eta_nom: 0.94          # η_ЭД.ном (Табл. 1.3: КПД 94 %)
      cos_phi: 0.89
      alpha: 1.0             # коэф. для (26); асинхр. 0,5..1
    transmission_eff: 1.0    # η_тр (прямой привод)
    vfd: false               # ПЧ отсутствует (η_пч не применяется)
  - {id: "Н-1", role: "резерв"}
  - {id: "Н-2", role: "резерв"}
  - {id: "Н-3", role: "резерв"}

# Эталонный режим — разовый замер аудита №31 (Табл. 3.1, 10.10.2025 09:00-10:00).
# Это ВХОД и ОЖИДАЕМЫЙ ВЫХОД для верификационного теста (tests/test_dns7s.py).
# Телеметрия в Excel (янв-май 2026) — другой период; для теста используется этот фиксированный режим.
reference_regime:
  aggregate: "Н-4"
  date: "2025-10-10"
  inputs:
    q: 75.17                 # м³/ч  — подача мгновенная
    rho: 1094.2              # кг/м³
    p_in: 0.398              # МПа   — давление на приёме
    p_out: 2.818             # МПа   — давление на выкиде
    p_electric: 97.2         # кВт   — измеренная активная мощность P_эл
    eta_pump_due: 0.576      # о.е.  — должный КПД насоса при Q=75,17 (с паспортной кривой Q-η)
    q_year: 446352           # м³    — годовой объём перекачки
    t_year: 7000             # ч     — годовая наработка
  expected:                  # из отчёта — допуски задаются в тесте
    h_fact: 225.4            # м
    p_hydraulic: 50.5        # кВт
    p_electric: 97.2         # кВт
    eta_fact: 0.52           # η_НА
    eta_nom: 0.564           # η_ном
    sec_fact: 1.29           # УРЭ факт, кВт·ч/м³
    sec_calc: 1.192          # УРЭ расч.
    load_factor: 0.6         # K_з
    eta_motor_calc: 0.931    # η_эд расч.
    eta_pump: 0.558          # η_нас
    eta_pump_due: 0.576      # η_нас.д
    dw_efficiency: 53242.9   # кВт·ч/год — потери из-за снижения КПД (ΔW_НА)
    dw_hydraulic: 46729      # кВт·ч/год — гидравл. потери в напорном трубопроводе

# Привязка сигналов телеметрии к листам Excel (для ingest).
telemetry:
  source_file: "data/raw/Копия ДНС-7с ДН.xlsx"
  transfer_file: "data/raw/ДНС-7с объем перекачки.xlsx"
  signals:
    p_in:  {sheet_prefix: "Давление на приеме",  unit: "МПа"}
    p_out: {sheet_prefix: "Давление на выкиде",  unit: "МПа"}
    flow:  {sheet: "Мгновенный расход жидкости", unit: "м3/ч"}
    level_be1: {sheet: "Уровень в БЕ-1", unit: "мм"}
    level_be2: {sheet: "Уровень в БЕ-2", unit: "мм"}
    state: {sheet_prefix: "Состояние", unit: "событие"}
    energy: {sheet_prefix: "Расход эл. энергии", unit: "кВт·ч"}
  aggregates_with_series: ["Н-1", "Н-2", "Н-3", "Н-4"]
